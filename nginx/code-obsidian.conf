# ── code-obsidian nginx config ────────────────────────────────────────────────
# /etc/nginx/sites-available/code-obsidian

server {
    listen 80;
    server_name davlat-obsidian.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name davlat-obsidian.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/davlat-obsidian.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davlat-obsidian.duckdns.org/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Bearer token auth ─────────────────────────────────────────────────────
    set $expected_auth "Bearer YOUR_MCP_AUTH_TOKEN";

    if ($http_authorization != $expected_auth) {
        return 401 '{"error":"unauthorized"}';
    }

    # ── SSE proxy ─────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;

        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (без авторизации) ────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_set_header Host $host;
    }
}
