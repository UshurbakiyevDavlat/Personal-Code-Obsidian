# ── code-obsidian nginx config ────────────────────────────────────────────────
# /etc/nginx/sites-available/code-obsidian

server {
    listen 80;
    server_name davlat-obsidian.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name davlat-obsidian.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/davlat-obsidian.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/davlat-obsidian.duckdns.org/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Health check (no auth) ────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_set_header Host $host;
    }

    # ── Messages endpoint (no auth — session_id is the ticket) ───────────────
    location /messages/ {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── GitHub Webhook (no auth — signature verified inside the app) ─────────
    location /webhook/github {
        proxy_pass         http://127.0.0.1:8002/webhook/github;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SSE endpoint (requires token via header OR ?token= query param) ───────
    location /sse {
        set $auth_ok 0;
        if ($http_authorization = "Bearer YOUR_MCP_AUTH_TOKEN") { set $auth_ok 1; }
        if ($arg_token = "YOUR_MCP_AUTH_TOKEN") { set $auth_ok 1; }
        if ($auth_ok = 0) {
            return 401 '{"error":"unauthorized"}';
        }

        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;

        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
