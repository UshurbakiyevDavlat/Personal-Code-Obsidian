# ── code-obsidian nginx config ────────────────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/code-obsidian
# Then: ln -s /etc/nginx/sites-available/code-obsidian /etc/nginx/sites-enabled/
# Then: certbot --nginx -d code-obsidian.YOUR_DOMAIN.com
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name code-obsidian.YOUR_DOMAIN.com;

    # Certbot will add SSL config here automatically
    # After certbot, HTTP redirects to HTTPS automatically

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name code-obsidian.YOUR_DOMAIN.com;

    # SSL certs (filled in by certbot)
    # ssl_certificate     /etc/letsencrypt/live/code-obsidian.YOUR_DOMAIN.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/code-obsidian.YOUR_DOMAIN.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Bearer token auth ─────────────────────────────────────────────────────
    # Cowork sends: Authorization: Bearer <MCP_AUTH_TOKEN>
    # Nginx validates it before proxying to the container.
    set $auth_token "Bearer ${MCP_AUTH_TOKEN}";  # fill from env or hardcode

    if ($http_authorization != $auth_token) {
        return 401 '{"error":"unauthorized"}';
    }

    # ── SSE proxy ─────────────────────────────────────────────────────────────
    # SSE requires long-lived connections — disable buffering and set long timeouts
    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;

        # SSE headers
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        # Long timeout for SSE streams
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check (no auth required) ──────────────────────────────────────
    location /health {
        auth_request off;
        proxy_pass http://127.0.0.1:8002/health;
        proxy_set_header Host $host;
    }
}
